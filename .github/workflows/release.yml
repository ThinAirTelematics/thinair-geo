# Release pipeline for thinair-geo (the npm package @thinairtelematics/geo).
#
# Triggered by pushing a `v*` tag (e.g. `v2.0.4`).
#
# Workflow:
#   1. npm publish with --provenance — generates a Sigstore attestation
#      linking the tarball to this commit + workflow. Surfaces as a green
#      "Provenance" badge on https://www.npmjs.com/package/@thinairtelematics/geo
#   2. mcp-publisher publish — pushes server.json to the official MCP Registry
#      under the co.thinair/geo namespace via DNS-based auth.
#
# One-time setup:
#   - https://www.npmjs.com/package/@thinairtelematics/geo/access
#       Add Trusted Publisher → GitHub Actions
#         org/user:           ThinAirTelematics
#         repository:         thinair-geo
#         workflow filename:  release.yml
#         environment:        Production
#   - Repo Settings → Secrets and variables → Actions → New environment secret
#       Environment name:  Production
#       Name:              MCP_DNS_PRIVATE_KEY
#       Value:             <hex-encoded ed25519 private key paired with the
#                          TXT record on thinair.co apex>

name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v2.0.4) — must already exist."
        required: true

permissions:
  contents: read
  id-token: write   # required for npm OIDC provenance

jobs:
  release:
    name: Publish to npm + MCP Registry
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          # Intentionally NOT setting registry-url — it writes
          # `_authToken=${NODE_AUTH_TOKEN}` into a userconfig .npmrc, which
          # shadows OIDC-based publish under Trusted Publisher. We write
          # our own .npmrc below with no token line.

      - name: Upgrade npm (Trusted Publisher OIDC auto-auth needs npm 11.5+)
        run: |
          npm install -g npm@latest
          npm --version

      - name: Inspect OIDC token claims (debug)
        run: |
          curl -fsSL -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=npm:registry.npmjs.org" \
            | python3 -c "import sys,json,base64;t=json.load(sys.stdin)[\"value\"];p=t.split(\".\")[1]+\"==\";c=json.loads(base64.urlsafe_b64decode(p));print(json.dumps({k:c[k] for k in (\"repository\",\"workflow\",\"workflow_ref\",\"environment\",\"ref\",\"event_name\",\"sub\")},indent=2))"

      - name: Verify package + server versions match
        run: |
          PKG=$(node -p "require('./package.json').version")
          SRV=$(node -p "require('./server.json').version")
          if [ "$PKG" != "$SRV" ]; then
            echo "::error::package.json (v$PKG) and server.json (v$SRV) disagree"
            exit 1
          fi

      - name: Publish to npm (with provenance, OIDC via Trusted Publisher)
        run: |
          # Token-less .npmrc forces OIDC auth via the package's npm
          # Trusted Publisher binding (no _authToken line at all).
          cat > /tmp/oidc.npmrc <<'EOF'
          registry=https://registry.npmjs.org/
          EOF
          # Diagnostic: confirm no token is leaking via env into npm.
          echo "NODE_AUTH_TOKEN length: ${#NODE_AUTH_TOKEN}"
          echo "userconfig in use: /tmp/oidc.npmrc"
          npm publish --provenance --access public --userconfig=/tmp/oidc.npmrc

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" \
            | tar xz mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/

      - name: Login + publish to MCP Registry
        env:
          MCP_DNS_PRIVATE_KEY: ${{ secrets.MCP_DNS_PRIVATE_KEY }}
        run: |
          if [ -z "$MCP_DNS_PRIVATE_KEY" ]; then
            echo "::error::MCP_DNS_PRIVATE_KEY secret missing in Production environment"
            exit 1
          fi
          mcp-publisher login dns --domain thinair.co --private-key "$MCP_DNS_PRIVATE_KEY"
          mcp-publisher publish

      - name: Summary
        run: |
          echo "## Release summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- npm: https://www.npmjs.com/package/@thinairtelematics/geo" >> "$GITHUB_STEP_SUMMARY"
          echo "- MCP Registry: https://registry.modelcontextprotocol.io/v0/servers?name=co.thinair/geo" >> "$GITHUB_STEP_SUMMARY"
