# Release pipeline for thinair-geo (the npm package @thinairtelematics/geo).
#
# Triggered by pushing a `v*` tag (e.g. `v2.0.4`).
#
# Workflow:
#   1. npm publish with --provenance — generates a Sigstore attestation
#      linking the tarball to this commit + workflow. Surfaces as a green
#      "Provenance" badge on https://www.npmjs.com/package/@thinairtelematics/geo
#   2. mcp-publisher publish — pushes server.json to the official MCP Registry
#      under the co.thinair/geo namespace via DNS-based auth.
#
# One-time setup:
#   - https://www.npmjs.com/package/@thinairtelematics/geo/access
#       Add Trusted Publisher → GitHub Actions
#         org/user:           ThinAirTelematics
#         repository:         thinair-geo
#         workflow filename:  release.yml
#         environment:        Production
#   - Repo Settings → Secrets and variables → Actions → New environment secret
#       Environment name:  Production
#       Name:              MCP_DNS_PRIVATE_KEY
#       Value:             <hex-encoded ed25519 private key paired with the
#                          TXT record on thinair.co apex>

name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v2.0.4) — must already exist."
        required: true

permissions:
  contents: read
  id-token: write   # required for npm OIDC provenance

jobs:
  release:
    name: Publish to npm + MCP Registry
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          # Do NOT set registry-url — setup-node would inject a userconfig
          # .npmrc containing `_authToken=${NODE_AUTH_TOKEN}` that shadows
          # OIDC publish via Trusted Publisher. We pass our own clean
          # token-less .npmrc to `npm publish` below.

      - name: Upgrade npm (Trusted Publisher OIDC auto-auth needs npm 11.5+)
        run: npm install -g npm@latest

      - name: Verify package + server versions match
        run: |
          PKG=$(node -p "require('./package.json').version")
          SRV=$(node -p "require('./server.json').version")
          if [ "$PKG" != "$SRV" ]; then
            echo "::error::package.json (v$PKG) and server.json (v$SRV) disagree"
            exit 1
          fi

      - name: Publish to npm (with provenance, OIDC via Trusted Publisher)
        run: |
          printf 'registry=https://registry.npmjs.org/\n' > /tmp/oidc.npmrc
          npm publish --provenance --access public --userconfig=/tmp/oidc.npmrc

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" \
            | tar xz mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/

      # mcp-publisher login github-oidc — same OIDC mechanism npm Trusted
      # Publisher uses (id-token: write permission already granted above).
      # No DNS keypair to maintain, no secret to rotate. Registry verifies
      # the OIDC token came from this exact repo + workflow.
      - name: Login + publish to MCP Registry (GitHub OIDC)
        run: |
          mcp-publisher login github-oidc
          mcp-publisher publish

      # Belt-and-suspenders: verify the registry actually serves the new
      # version + configSchema. Failing here catches "publish appeared to
      # succeed but the registry still returns stale metadata" cases
      # (cache propagation hiccups, partial writes). The release isn't
      # done until Smithery and other directory pullers can see the
      # updated config schema.
      - name: Verify registry served the new server.json
        run: |
          set -e
          LOCAL=$(node -p "require('./server.json').version")
          for i in 1 2 3 4 5; do
            sleep 5
            REG=$(curl -fsS "https://registry.modelcontextprotocol.io/v0/servers?search=co.thinair/geo&limit=10" \
              | jq -r '.servers[]? | select(.server.name == "co.thinair/geo") | select(._meta["io.modelcontextprotocol.registry/official"].isLatest == true) | .server.version' \
              | head -n1)
            if [ "$REG" = "$LOCAL" ]; then
              echo "registry latest = $REG (matches local $LOCAL)"
              # Also confirm configSchema made it through
              HAS_CFG=$(curl -fsS "https://registry.modelcontextprotocol.io/v0/servers?search=co.thinair/geo&limit=10" \
                | jq -r '.servers[]? | select(.server.name == "co.thinair/geo") | select(._meta["io.modelcontextprotocol.registry/official"].isLatest == true) | (.server.configSchema // .configSchema // null)' \
                | head -n1)
              if [ "$HAS_CFG" = "null" ] || [ -z "$HAS_CFG" ]; then
                echo "::error::registry has v$REG but configSchema missing — publish content lost"
                exit 1
              fi
              echo "configSchema present"
              exit 0
            fi
            echo "attempt $i: registry latest = '$REG', expected '$LOCAL' — retrying"
          done
          echo "::error::registry did not converge to v$LOCAL after 25s"
          exit 1

      - name: Summary
        run: |
          echo "## Release summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- npm: https://www.npmjs.com/package/@thinairtelematics/geo" >> "$GITHUB_STEP_SUMMARY"
          echo "- MCP Registry: https://registry.modelcontextprotocol.io/v0/servers?name=co.thinair/geo" >> "$GITHUB_STEP_SUMMARY"
