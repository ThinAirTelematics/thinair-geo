name: Publish @thinairtelematics/geo-mcp

# Publishes the config-printer at @thinairtelematics/geo-mcp from the
# geo-mcp/ subtree. Uses Trusted Publisher OIDC for auth (no NPM_TOKEN
# secret involved) so the npm "Published by" attribution is "GitHub
# Actions" rather than the token owner. --provenance also generates a
# sigstore attestation visible as a verified-build badge on npmjs.com.
#
# One-time setup on npmjs.com → @thinairtelematics/geo-mcp → Settings
# → Access → Trusted Publishers → Add:
#   org/user           ThinAirTelematics
#   repository         thinair-geo
#   workflow filename  release-mcp.yml
#   environment        Production
#
# Triggers:
#  - push to main under geo-mcp/** → publish automatically
#  - workflow_dispatch from any branch → smoke-test + version gate;
#    publish only when `dry_run=false` (default: true).

on:
  push:
    branches: [main]
    paths:
      - 'geo-mcp/**'
      - '.github/workflows/release-mcp.yml'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run (smoke-test + version gate only; do NOT push to npm)'
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write   # required for OIDC + provenance

jobs:
  publish:
    name: npm publish
    runs-on: ubuntu-latest
    environment: Production
    defaults:
      run:
        working-directory: geo-mcp

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Deliberately NOT setting registry-url. setup-node would inject
          # a userconfig .npmrc with _authToken=${NODE_AUTH_TOKEN} that
          # shadows OIDC publish via Trusted Publisher.

      - name: Upgrade npm (Trusted Publisher OIDC auto-auth needs 11.5+)
        run: npm install -g npm@latest

      - name: Smoke test — binary runs and prints help
        run: |
          node ./bin/start.js --help | head -20
          node ./bin/start.js | grep -q "mcpServers"
          node ./bin/start.js --transport sse | grep -q '/sse'

      - name: Version gate — compare local to npm registry
        id: versions
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view @thinairtelematics/geo-mcp version 2>/dev/null || echo "0.0.0")
          echo "local=$LOCAL"     >> "$GITHUB_OUTPUT"
          echo "published=$PUBLISHED" >> "$GITHUB_OUTPUT"
          if [ "$LOCAL" = "$PUBLISHED" ]; then
            echo "Same version already published ($LOCAL) — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Publishing $LOCAL (latest on npm: $PUBLISHED)"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Decide whether to publish
        id: decide
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.dry_run }}" = "true" ]; then
              echo "Dry-run requested — will not publish."
              echo "will_publish=false" >> "$GITHUB_OUTPUT"
            else
              echo "Manual dispatch with dry_run=false — will publish."
              echo "will_publish=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "Push to main — will publish."
            echo "will_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm (Trusted Publisher OIDC + provenance)
        if: steps.versions.outputs.skip == 'false' && steps.decide.outputs.will_publish == 'true'
        run: |
          printf 'registry=https://registry.npmjs.org/\n' > /tmp/oidc.npmrc
          npm publish --provenance --access public --userconfig=/tmp/oidc.npmrc

      - name: Summary
        run: |
          echo "### @thinairtelematics/geo-mcp" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Local version | \`${{ steps.versions.outputs.local }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Registry version | \`${{ steps.versions.outputs.published }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Would publish | \`${{ steps.decide.outputs.will_publish }}\` |" >> "$GITHUB_STEP_SUMMARY"
